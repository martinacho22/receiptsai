<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --p: #0d7675; --p-hover: #095c5b; --p-light: #e8f5f5;
    --s: #f7f5f2; --w: #ffffff; --b: #1a1a2e;
    --g-50:#f9fafb; --g-100:#f3f4f6; --g-200:#e5e7eb; --g-300:#d1d5db;
    --g-400:#9ca3af; --g-500:#6b7280; --g-600:#4b5563; --g-700:#374151;
    --amber:#d97706; --amber-bg:#fffbeb; --red:#dc2626; --red-bg:#fef2f2;
    --green:#059669; --blue:#2563eb;
    --radius:12px; --radius-sm:8px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.06); --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
    --font:'Inter',system-ui,-apple-system,sans-serif;
  }
  html { font-size:16px; }
  body { font-family:var(--font); background:var(--s); color:var(--b); min-height:100vh; }
  .app { display:flex; min-height:100vh; }
  /* ── Sidebar ── */
  .sidebar { width:240px; background:var(--w); border-right:1px solid var(--g-200); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
  .sidebar-brand { padding:20px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--g-200); }
  .sidebar-brand svg { color:var(--p); }
  .sidebar-brand span { font-weight:600; font-size:16px; color:var(--b); }
  .sidebar-brand small { font-size:11px; color:var(--g-400); display:block; margin-top:-2px; }
  .sidebar-nav { flex:1; padding:12px 8px; display:flex; flex-direction:column; gap:2px; }
  .sidebar-nav a { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-sm); text-decoration:none; color:var(--g-600); font-size:14px; font-weight:500; transition:.15s; cursor:pointer; }
  .sidebar-nav a:hover { background:var(--g-100); }
  .sidebar-nav a.active { background:var(--p-light); color:var(--p); font-weight:600; }
  .sidebar-nav a svg { width:20px; height:20px; flex-shrink:0; }
  .sidebar-footer { padding:16px; border-top:1px solid var(--g-200); font-size:12px; color:var(--g-400); text-align:center; }
  /* ── Main ── */
  .main { flex:1; min-width:0; overflow-y:auto; }
  .topbar { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; background:var(--w); border-bottom:1px solid var(--g-200); position:sticky; top:0; z-index:10; }
  .topbar h1 { font-size:20px; font-weight:600; color:var(--b); }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .topbar-right .company-badge { font-size:13px; color:var(--g-500); background:var(--g-100); padding:6px 12px; border-radius:20px; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius-sm); font-size:14px; font-weight:500; border:none; cursor:pointer; transition:.15s; text-decoration:none; }
  .btn-primary { background:var(--p); color:var(--w); }
  .btn-primary:hover { background:var(--p-hover); }
  .btn-outline { background:transparent; color:var(--g-600); border:1px solid var(--g-300); }
  .btn-outline:hover { background:var(--g-50); }
  .btn-sm { padding:6px 12px; font-size:13px; }
  .btn-icon { width:36px; height:36px; padding:0; justify-content:center; border-radius:50%; }
  .btn-danger { background:var(--red); color:var(--w); }
  .btn-danger:hover { opacity:.9; }
  .btn-success { background:var(--green); color:var(--w); }
  .btn-success:hover { opacity:.9; }
  .content { padding:24px; }
  /* ── KPI Cards ── */
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
  .kpi-card { background:var(--w); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); }
  .kpi-card .kpi-label { font-size:13px; color:var(--g-500); margin-bottom:4px; }
  .kpi-card .kpi-value { font-size:28px; font-weight:700; color:var(--b); }
  .kpi-card .kpi-sub { font-size:13px; color:var(--g-400); margin-top:4px; }
  .kpi-card .kpi-icon { float:right; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .kpi-card .kpi-icon.teal { background:var(--p-light); color:var(--p); }
  .kpi-card .kpi-icon.amber { background:var(--amber-bg); color:var(--amber); }
  .kpi-card .kpi-icon.red { background:var(--red-bg); color:var(--red); }
  .kpi-card .kpi-icon.green { background:#ecfdf5; color:var(--green); }
  .kpi-card .kpi-icon.blue { background:#eff6ff; color:var(--blue); }
  /* ── Tables ── */
  .card { background:var(--w); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:24px; overflow:hidden; }
  .card-header { padding:16px 20px; border-bottom:1px solid var(--g-200); display:flex; justify-content:space-between; align-items:center; }
  .card-header h2 { font-size:16px; font-weight:600; }
  .card-body { padding:0; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { text-align:left; padding:12px 16px; font-weight:600; color:var(--g-500); font-size:12px; text-transform:uppercase; letter-spacing:.03em; border-bottom:1px solid var(--g-200); background:var(--g-50); }
  td { padding:12px 16px; border-bottom:1px solid var(--g-100); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--g-50); }
  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:500; }
  .badge-paid { background:#ecfdf5; color:var(--green); }
  .badge-pending { background:var(--amber-bg); color:var(--amber); }
  .badge-review { background:#f0f0ff; color:#6366f1; }
  .badge-overdue { background:var(--red-bg); color:var(--red); }
  .badge-verified { background:var(--p-light); color:var(--p); }
  .badge-low { background:var(--amber-bg); color:var(--amber); }
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .status-dot.green { background:var(--green); }
  .status-dot.amber { background:var(--amber); }
  .status-dot.red { background:var(--red); }
  /* ── Empty state ── */
  .empty-state { text-align:center; padding:60px 20px; color:var(--g-400); }
  .empty-state svg { width:64px; height:64px; color:var(--g-300); margin-bottom:16px; }
  .empty-state p { font-size:16px; margin-bottom:8px; }
  .empty-state small { font-size:13px; }
  /* ── Modal ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--w); border-radius:var(--radius); max-width:640px; width:90%; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-md); }
  .modal-header { padding:20px 24px; border-bottom:1px solid var(--g-200); display:flex; justify-content:space-between; align-items:center; }
  .modal-header h2 { font-size:18px; font-weight:600; }
  .modal-close { background:none; border:none; font-size:24px; color:var(--g-400); cursor:pointer; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; }
  .modal-close:hover { background:var(--g-100); }
  .modal-body { padding:24px; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--g-200); display:flex; justify-content:flex-end; gap:8px; }
  .modal-footer .btn { min-width:80px; justify-content:center; }
  /* ── Conf. badge ── */
  .conf-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .conf-high { background:#ecfdf5; color:var(--green); }
  .conf-med { background:var(--amber-bg); color:var(--amber); }
  .conf-low { background:var(--red-bg); color:var(--red); }
  /* ── Detail row ── */
  .detail-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--g-100); }
  .detail-row:last-child { border-bottom:none; }
  .detail-label { color:var(--g-500); font-size:14px; }
  .detail-value { font-weight:500; font-size:14px; text-align:right; }
  /* ── Section ── */
  .section-title { font-size:14px; font-weight:600; color:var(--g-700); margin:20px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--g-200); }
  .section-title:first-child { margin-top:0; }
  /* ── Pricing cards ── */
  .pricing-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
  .pricing-card { background:var(--w); border:1px solid var(--g-200); border-radius:var(--radius); padding:20px; text-align:center; transition:.15s; }
  .pricing-card:hover { border-color:var(--p); box-shadow:var(--shadow-md); }
  .pricing-card.featured { border-color:var(--p); background:var(--p-light); }
  .pricing-card .plan-name { font-size:14px; font-weight:600; color:var(--g-700); margin-bottom:4px; }
  .pricing-card .plan-price { font-size:24px; font-weight:700; color:var(--b); }
  .pricing-card .plan-price small { font-size:14px; font-weight:400; color:var(--g-400); }
  .pricing-card .plan-desc { font-size:13px; color:var(--g-500); margin-top:8px; }
  .pricing-card .plan-features { list-style:none; margin-top:12px; text-align:left; }
  .pricing-card .plan-features li { padding:4px 0; font-size:13px; color:var(--g-600); display:flex; align-items:center; gap:6px; }
  .pricing-card .plan-features li::before { content:'✓'; color:var(--green); font-weight:700; }
  /* ── Confirm dialog ── */
  .confirm-dialog { text-align:center; padding:20px; }
  .confirm-dialog .confirm-icon { width:56px; height:56px; border-radius:50%; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; }
  .confirm-dialog .confirm-icon.success { background:#ecfdf5; color:var(--green); }
  .confirm-dialog h3 { font-size:18px; margin-bottom:8px; }
  .confirm-dialog p { color:var(--g-500); font-size:14px; margin-bottom:4px; }
  /* ── Tabs ── */
  .tabs { display:flex; gap:0; border-bottom:1px solid var(--g-200); margin-bottom:20px; }
  .tab { padding:10px 20px; font-size:14px; font-weight:500; color:var(--g-500); cursor:pointer; border-bottom:2px solid transparent; transition:.15s; background:none; border-top:none; border-left:none; border-right:none; }
  .tab:hover { color:var(--b); }
  .tab.active { color:var(--p); border-bottom-color:var(--p); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  /* ── Search ── */
  .search-bar { display:flex; align-items:center; gap:8px; background:var(--g-50); border:1px solid var(--g-200); border-radius:var(--radius-sm); padding:8px 12px; width:280px; }
  .search-bar input { border:none; background:transparent; outline:none; font-size:14px; color:var(--b); width:100%; }
  .search-bar input::placeholder { color:var(--g-400); }
  .search-bar svg { width:18px; height:18px; color:var(--g-400); flex-shrink:0; }
  .flex { display:flex; }
  .flex-col { flex-direction:column; }
  .items-center { align-items:center; }
  .justify-between { justify-content:space-between; }
  .gap-2 { gap:8px; }
  .gap-3 { gap:12px; }
  .gap-4 { gap:16px; }
  .mt-4 { margin-top:16px; }
  .mb-4 { margin-bottom:16px; }
  .mb-2 { margin-bottom:8px; }
  .text-sm { font-size:13px; color:var(--g-500); }
  .text-xs { font-size:12px; color:var(--g-400); }
  .font-medium { font-weight:500; }
  .font-semibold { font-weight:600; }
  .text-right { text-align:right; }
  @media(max-width:768px) {
    .sidebar { display:none; }

    .content { padding:16px; }

    .topbar { padding:12px 16px; }
    .search-bar { width:100%; }
    .pricing-grid { grid-template-columns:1fr; }
    .modal { width:95%; }
    .mobile-menu-btn { display:flex !important; }
  }
  @media(min-width:769px) {

  }
</style>

// ─── NAV ───────────────────────────────────────────────────────────
function navigate(page){
  document.querySelectorAll('.sidebar-nav a').forEach(a=>a.classList.remove('active'));
  document.querySelector(`.sidebar-nav a[data-page="${page}"]`)?.classList.add('active');
  document.getElementById('page-title').textContent=PAGES[page].title;
  document.getElementById('page-content').innerHTML=PAGES[page].render();
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('mobile-open');
}
document.querySelectorAll('.sidebar-nav a').forEach(a=>{
  a.addEventListener('click',()=>navigate(a.dataset.page));
});

// ─── RECEIPT MODAL ────────────────────────────────────────────────
function openReceipt(id){
  const r=RECEIPTS.find(x=>x.id===id);
  if(!r) return;
  const d=EMPLOYEES.find(e=>e.name===r.driver);
  const confClass=r.match>=90?'conf-high':r.match>=75?'conf-med':'conf-low';
  const confLabel=r.match>=90?'Alta':r.match>=75?'Media':'Baja';
  const badgeMap={review:'badge-review',paid:'badge-paid',overdue:'badge-overdue'};
  const statusMap={review:'Revisión',paid:'Pagado',overdue:'Vencido'};
  const modal=document.getElementById('receipt-modal');
  modal.querySelector('.modal-header h2').textContent=`Comprobante ${r.id}`;
  modal.querySelector('.modal-body').innerHTML=`
    <div class="section-title">📄 Datos del Comprobante</div>
    <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value" style="font-family:monospace">${r.id}</span></div>
    <div class="detail-row"><span class="detail-label">Conductor</span><span class="detail-value">${r.driver}</span></div>
    <div class="detail-row"><span class="detail-label">Vehículo</span><span class="detail-value">${r.vehicle}</span></div>
    <div class="detail-row"><span class="detail-label">Fecha</span><span class="detail-value">${r.date}</span></div>
    <div class="detail-row"><span class="detail-label">Concepto</span><span class="detail-value">${r.concept}</span></div>
    <div class="detail-row"><span class="detail-label">Monto</span><span class="detail-value" style="font-size:18px;font-weight:700">$${r.amount.toLocaleString()}</span></div>
    <div class="detail-row"><span class="detail-label">Teléfono</span><span class="detail-value">${r.phone}</span></div>
    <div class="detail-row"><span class="detail-label">Estado</span><span class="detail-value"><span class="badge ${badgeMap[r.status]}">${statusMap[r.status]}</span></span></div>
    <div class="section-title">🤖 Verificación por IA</div>
    <div class="detail-row"><span class="detail-label">Confianza General</span><span class="detail-value"><span class="conf-badge ${confClass}">${r.match}% · ${confLabel}</span></span></div>
    <div class="detail-row"><span class="detail-label">Monto vs. Gasolina</span><span class="detail-value"><span class="conf-badge conf-high">95% · Alta</span></span></div>
    <div class="detail-row"><span class="detail-label">Proveedor</span><span class="detail-value"><span class="conf-badge conf-med">82% · Media</span></span></div>
    <div class="detail-row"><span class="detail-label">Fecha/Hora</span><span class="detail-value"><span class="conf-badge conf-high">98% · Alta</span></span></div>
    <div class="detail-row"><span class="detail-label">Placas</span><span class="detail-value"><span class="conf-badge conf-med">78% · Media</span></span></div>
    <div style="margin-top:16px;padding:12px;background:var(--p-light);border-radius:8px;font-size:13px;color:var(--g-600)">
      <strong>📸</strong> Comprobante recibido vía WhatsApp el ${r.date} a las 14:32 hrs.
      ${r.match<75?'<br><span style="color:var(--red)">⚠️ Baja confianza — revisión manual requerida</span>':''}
    </div>`;
  modal.classList.add('open');
  modal.querySelector('.modal-footer').innerHTML=`
    ${r.status==='review'?`<button class="btn btn-success" onclick="markPaid('${r.id}')">✅ Aprobar y Pagar</button>`:''}
    ${r.status==='overdue'?`<button class="btn btn-danger" onclick="markPaid('${r.id}')">⚠️ Pagar Vencido</button>`:''}
    <button class="btn btn-outline" onclick="closeReceiptModal()">Cerrar</button>`;
}
function closeReceiptModal(){
  document.getElementById('receipt-modal').classList.remove('open');
}
function markPaid(id){
  const r=RECEIPTS.find(x=>x.id===id);
  if(!r) return;
  r.status='paid';
  const d=EMPLOYEES.find(e=>e.name===r.driver);
  if(d){ d.paid+=r.amount; TOTALS.paidMXN+=r.amount; TOTALS.paid++; }
  closeReceiptModal();
  navigate(document.querySelector('.sidebar-nav a.active')?.dataset.page||'dashboard');
}
function simulatePayment(eid,name,amount){
  document.getElementById('confirm-modal').classList.add('open');
  document.getElementById('confirm-modal').querySelector('.modal-body').innerHTML=`
    <div class="confirm-dialog">
      <div class="confirm-icon success"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
      <h3>✅ ¡Pago realizado!</h3>
      <p>Se pagaron <strong>$${parseInt(amount).toLocaleString()} MXN</strong> a <strong>${name}</strong></p>
      <p style="font-size:13px;color:var(--g-400);margin-top:8px">Comprobante: PAG-${Date.now().toString(36).toUpperCase()}</p>
      <p style="font-size:12px;color:var(--g-400)">${new Date().toLocaleString('es-MX',{timeZone:'America/Mexico_City'})}</p>
    </div>`;
  document.getElementById('confirm-modal').querySelector('.modal-footer').innerHTML=`<button class="btn btn-primary" onclick="closeConfirm()">Aceptar</button>`;
  const e=EMPLOYEES.find(x=>x.id===eid);
  if(e){ e.paid=e.totalMXN; e.status='paid'; TOTALS.paidMXN+=e.totalMXN-e.paid; TOTALS.paid++; }
}
function closeConfirm(){
  document.getElementById('confirm-modal').classList.remove('open');
  navigate(document.querySelector('.sidebar-nav a.active')?.dataset.page||'dashboard');
}

// ─── FILTER ────────────────────────────────────────────────────────
function filterReceipts(){
  const q=document.getElementById('receipt-search')?.value?.toLowerCase()||'';
  const f=document.getElementById('receipt-filter')?.value||'all';
  document.querySelectorAll('#receipt-tbody tr').forEach(tr=>{
    const match=(f==='all'||tr.dataset.status===f)&&(!q||tr.dataset.search?.toLowerCase().includes(q));
    tr.style.display=match?'':'none';
  });
}

// ─── INIT ──────────────────────────────────────────────────────────
navigate('dashboard');
</script>
