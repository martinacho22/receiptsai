'<div class="pricing-grid">'+PRICING_TIERS.map(p=>'<div class="pricing-card'+(p.featured?' featured':'')+'"><div class="plan-name">'+p.name+'</div><div class="plan-price">$'+p.price+'<small>'+p.period+'</small></div><div class="plan-desc">'+p.desc+'</div><ul class="plan-features">'+p.features.map(f=>'<li>'+f+'</li>').join('')+'</ul>'+(p.featured?'<button class="btn btn-primary" style="margin-top:16px;width:100%;justify-content:center">Plan Actual</button>':'')+'</div>').join('')+'</div></div>'
}
}
};

function navigate(page){
document.querySelectorAll('.sidebar-nav a').forEach(a=>a.classList.remove('active'));
const nl=document.querySelector('.sidebar-nav a[data-page="'+page+'"]');
if(nl)nl.classList.add('active');
const pg=PAGES[page];
if(pg){document.getElementById('page-title').textContent=pg.title;document.getElementById('page-content').innerHTML=pg.render()}
if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('mobile-open');
}

document.addEventListener('click',function(e){const nl=e.target.closest('.sidebar-nav a[data-page]');if(nl)navigate(nl.dataset.page)});

function openReceipt(id){
const r=RECEIPTS.find(x=>x.id===id);if(!r)return;
const bg={'review':'badge-review','paid':'badge-paid','overdue':'badge-overdue','pending':'badge-pending'};
const st={'review':'Revision','paid':'Pagado','overdue':'Vencido','pending':'Pendiente'};
const cc=r.match>=90?'conf-high':r.match>=75?'conf-med':'conf-low';const cl=r.match>=90?'Alta':r.match>=75?'Media':'Baja';
const m=document.getElementById('receipt-modal');
m.querySelector('.modal-header h2').textContent='Comprobante '+r.id;
m.querySelector('.modal-body').innerHTML='<div class="section-title">Datos del Comprobante</div>'+
'<div class="detail-row"><span class="detail-label">ID</span><span class="detail-value" style="font-family:monospace">'+r.id+'</span></div>'+
'<div class="detail-row"><span class="detail-label">Conductor</span><span class="detail-value">'+r.driver+'</span></div>'+
'<div class="detail-row"><span class="detail-label">Vehiculo</span><span class="detail-value">'+r.vehicle+'</span></div>'+
'<div class="detail-row"><span class="detail-label">Fecha</span><span class="detail-value">'+r.date+'</span></div>'+
'<div class="detail-row"><span class="detail-label">Concepto</span><span class="detail-value">'+r.concept+'</span></div>'+
'<div class="detail-row"><span class="detail-label">Monto</span><span class="detail-value" style="font-size:18px;font-weight:700">$'+r.amount.toLocaleString()+'</span></div>'+
'<div class="detail-row"><span class="detail-label">Telefono</span><span class="detail-value">'+r.phone+'</span></div>'+
'<div class="detail-row"><span class="detail-label">Estado</span><span class="detail-value"><span class="badge '+bg[r.status]+'">'+st[r.status]+'</span></span></div>'+
'<div class="section-title">Verificacion por IA</div>'+
'<div class="detail-row"><span class="detail-label">Confianza General</span><span class="detail-value"><span class="conf-badge '+cc+'">'+r.match+'% · '+cl+'</span></span></div>'+
'<div class="detail-row"><span class="detail-label">Monto vs. Gasolina</span><span class="detail-value"><span class="conf-badge conf-high">95% · Alta</span></span></div>'+
'<div class="detail-row"><span class="detail-label">Proveedor</span><span class="detail-value"><span class="conf-badge conf-med">82% · Media</span></span></div>'+
'<div class="detail-row"><span class="detail-label">Fecha/Hora</span><span class="detail-value"><span class="conf-badge conf-high">98% · Alta</span></span></div>'+
'<div class="detail-row"><span class="detail-label">Placas</span><span class="detail-value"><span class="conf-badge conf-med">78% · Media</span></span></div>'+
'<div style="margin-top:16px;padding:12px;background:#e6f2ef;border-radius:8px;font-size:13px;color:#6b6255"><strong> Foto:</strong> Comprobante recibido via WhatsApp el '+r.date+' a las 14:32 hrs.'+(r.match<75?'<br><span style="color:#b8433a"> Baja confianza — revision manual requerida</span>':'')+'</div>';
m.classList.add('open');
m.querySelector('.modal-footer').innerHTML=(r.status==='review'?'<button class="btn btn-success" onclick="markPaid(\''+r.id+'\')">Aprobar y Pagar</button>':'')+(r.status==='overdue'?'<button class="btn btn-danger" onclick="markPaid(\''+r.id+'\')">Pagar Vencido</button>':'')+(r.status==='pending'?'<button class="btn btn-primary" onclick="markPaid(\''+r.id+'\')">Pagar</button>':'')+'<button class="btn btn-outline" onclick="closeReceiptModal()">Cerrar</button>';
}

function closeReceiptModal(){document.getElementById('receipt-modal').classList.remove('open')}

function markPaid(id){
const r=RECEIPTS.find(x=>x.id===id);
if(!r)return;r.status='paid';TOTALS.paidMXN+=r.amount;TOTALS.paid++;
closeReceiptModal();const a=document.querySelector('.sidebar-nav a.active');navigate(a?a.dataset.page:'dashboard');
}

function simulatePayment(eid,name,amount){
document.getElementById('confirm-modal').classList.add('open');
const b=document.getElementById('confirm-modal').querySelector('.modal-body');
b.innerHTML='<div class="confirm-dialog"><div class="confirm-icon success"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><h3>Pago realizado</h3><p>Se pagaron <strong>$'+parseInt(amount).toLocaleString()+' MXN</strong> a <strong>'+name+'</strong></p><p style="font-size:13px;color:#a89e8f;margin-top:8px">Comprobante: PAG-'+Date.now().toString(36).toUpperCase()+'</p><p style="font-size:12px;color:#a89e8f">'+new Date().toLocaleString('es-MX',{timeZone:'America/Mexico_City'})+'</p></div>';
document.getElementById('confirm-modal').querySelector('.modal-footer').innerHTML='<button class="btn btn-primary" onclick="closeConfirm()">Aceptar</button>';
const e=EMPLOYEES.find(x=>x.id===eid);if(e){e.paid=parseInt(e.totalMXN);e.status='paid'}
}

function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');const a=document.querySelector('.sidebar-nav a.active');navigate(a?a.dataset.page:'dashboard')}

function filterReceipts(){
const q=(document.getElementById('receipt-search')?.value||'').toLowerCase();
const f=document.getElementById('receipt-filter')?.value||'all';
document.querySelectorAll('#receipt-tbody tr').forEach(tr=>{const m=(f==='all'||tr.dataset.status===f)&&(!q||(tr.dataset.search||'').toLowerCase().includes(q));tr.style.display=m?'':'none'});
}

navigate('dashboard');
</script>

<div class="modal-overlay" id="receipt-modal"><div class="modal"><div class="modal-header"><h2>Comprobante</h2><button class="modal-close" onclick="closeReceiptModal()">x</button></div><div class="modal-body"></div><div class="modal-footer"></div></div></div>
<div class="modal-overlay" id="confirm-modal"><div class="modal" style="max-width:420px"><div class="modal-body"></div><div class="modal-footer"></div></div></div>
</body>
</html>
