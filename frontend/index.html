<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReceiptsAI — Gestión de Comprobantes</title>
  <meta name="description" content="Plataforma de gestión de comprobantes fiscales para flotillas" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Config: override API_BASE by setting this variable before api.js loads -->
  <script>
    // Auto-detect API_BASE — works whether served by FastAPI (same origin)
    // or opened standalone (file://) against a separate backend.
    window.__RECEIPTSAI_API_URL__ = (function() {
      var origin = window.location.origin;
      // file:// or null — assume standalone dev
      if (origin === 'file://' || origin === 'null') {
        return 'http://localhost:8000';
      }
      // Same origin — the API is right there at the root
      return origin;
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/svgs.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/comprobantes.js"></script>
  <script src="js/pagar.js"></script>
  <script src="js/conductores.js"></script>
  <script src="js/configuracion.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
