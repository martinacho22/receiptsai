<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReceiptsAI — Gestión de Comprobantes</title>
  <meta name="description" content="Plataforma de gestión de comprobantes fiscales para flotillas" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Config: override API_BASE by setting this variable before api.js loads -->
  <script>
    // When served by the same FastAPI process, the API is at the root.
    // In dev (file:// or standalone), point at localhost:8000.
    window.__RECEIPTSAI_API_URL__ = (function() {
      // If served via file://, assume standalone dev against localhost:8000
      if (window.location.origin === 'file://' || window.location.origin === 'null') {
        return 'http://localhost:8000';
      }
      // If served by FastAPI (e.g. http://localhost:8000/app/), API is at root
      var origin = window.location.origin;
      // Check if we're mounted under a prefix by seeing if /app/ is in the path
      if (window.location.pathname.startsWith('/app/')) {
        return origin;  // API is at the root, e.g. http://localhost:8000/auth/login
      }
      // Fallback: assume API is at root
      return origin;
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/comprobantes.js"></script>
  <script src="js/conductores.js"></script>
  <script src="js/configuracion.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
